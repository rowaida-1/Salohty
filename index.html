<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Important Question ❤️</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      margin-top: 100px;
      background-color: #ffe6e6;
    }

    h1 {
      font-size: 30px;
    }

    .btn {
      padding: 15px 25px;
      font-size: 18px;
      margin: 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #yes {
      background-color: #4CAF50;
      color: white;
    }

    #no {
      background-color: #f44336;
      color: white;
      position: absolute;
    }
  </style>
</head>
<body>

  <h1>Do you love Rory? ❤️</h1>

  <button id="yes" class="btn" onclick="yesClicked()">Yes 😍</button>
  <button id="no" class="btn">No 😢</button>

  <script>
    const noBtn = document.getElementById("no");

    noBtn.addEventListener("mouseover", () => {
      const x = Math.random() * (window.innerWidth - 100);
      const y = Math.random() * (window.innerHeight - 100);

      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    });

    function yesClicked() {
      document.body.innerHTML = `
        <h1 style="font-size: 50px; color: #ff0066; margin-top: 100px;">Love you Loly ❤️</h1>
        <div style="font-size: 150px;">😍💖😘</div>
      `;
      document.body.style.backgroundColor = "#fff0f5";
    }
  </script>

</body>
</html>
