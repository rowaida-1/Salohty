<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Important Question ❤️</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: white;
      
      /* Animated gradient background */
      background: linear-gradient(270deg, #ff00cc, #3333ff, #00ffee);
      background-size: 600% 600%;
      animation: gradientMove 10s ease infinite;
    }

    @keyframes gradientMove {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    h1 {
      font-size: 40px;
      text-shadow: 0 0 20px rgba(255,255,255,0.8);
    }

    .btn {
      padding: 15px 30px;
      font-size: 20px;
      margin: 20px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    #yes {
      background: #00ffcc;
      color: black;
      box-shadow: 0 0 20px #00ffcc;
    }

    #yes:hover {
      transform: scale(1.1);
    }

    #no {
      background: #ff3366;
      color: white;
      position: absolute;
      box-shadow: 0 0 20px #ff3366;
    }

    /* Floating hearts */
    .heart {
      position: absolute;
      color: pink;
      font-size: 20px;
      animation: float 5s linear infinite;
    }

    @keyframes float {
      from {transform: translateY(100vh);}
      to {transform: translateY(-10vh);}
    }
  </style>
</head>

<body>

  <h1>Do you love me? ❤️</h1>

  <button id="yes" class="btn" onclick="yesClicked()">Yes 😍</button>
  <button id="no" class="btn">No 😢</button>

  <script>
    const noBtn = document.getElementById("no");

    noBtn.addEventListener("mouseover", () => {
      const x = Math.random() * (window.innerWidth - 100);
      const y = Math.random() * (window.innerHeight - 100);

      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    });

    function yesClicked() {
      document.body.innerHTML = `
        <h1 style="font-size:60px;">Love you Loly ❤️</h1>
        <div style="font-size:150px;">😍💖😘</div>
      `;
    }

    // Create floating hearts
    setInterval(() => {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "💖";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (20 + Math.random() * 30) + "px";
      document.body.appendChild(heart);

      setTimeout(() => heart.remove(), 5000);
    }, 300);
  </script>

</body>
</html>
